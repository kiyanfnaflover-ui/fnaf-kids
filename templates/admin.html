<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breaker Room - Admin</title>
    <link rel="icon" href="{{ url_for('static', filename='assets/favicon.png') }}" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="admin-bg">

    <div class="admin-card glass-panel">
        <h1>🔧 Fazbear Breaker Control Panel</h1>
        <p>Directly route data packets into specific mainframe folders.</p>
        <hr class="neon-line">

        <form action="/upload" method="POST" enctype="multipart/form-data" class="upload-box">
            <input type="hidden" name="type" value="comic">
            <label>Upload PDF Comic (Saves to /uploads/comics/)</label>
            <input type="file" name="file" accept=".pdf" required>
            <button type="submit">Push to Comic Server</button>
        </form>

        <form action="/upload" method="POST" enctype="multipart/form-data" class="upload-box">
            <input type="hidden" name="type" value="gallery">
            <label>Upload Video/Image Edits (Saves to /uploads/gallery/)</label>
            <input type="file" name="file" accept="video/*,image/*" required>
            <button type="submit">Push to Gallery</button>
        </form>

        <form action="/upload" method="POST" enctype="multipart/form-data" class="upload-box">
            <input type="hidden" name="type" value="link">
            <label>Upload Share Links .txt File (Saves to /uploads/links/)</label>
            <input type="file" name="file" accept=".txt" required>
            <button type="submit">Inject System Links</button>
        </form>

        <a href="/" class="back-btn">← Return to Main Office</a>
    </div>

</body>
</html>
